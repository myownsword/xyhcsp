{% extends "base.html" %}
{% block title %}{% if supply %}编辑{% else %}新增{% endif %}耗材{% endblock %}
{% block content %}

<div class="page-header">
    <div class="page-title">{% if supply %}✏️ 编辑耗材{% else %}➕ 新增耗材品类{% endif %}</div>
    <div class="page-actions">
        <a href="/supplies" class="btn btn-outline btn-sm">← 返回列表</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="form-row">
                <div class="form-group">
                    <label>耗材名称 <span class="required">*</span></label>
                    <input type="text" name="name" class="form-control" required value="{{ supply.name if supply else '' }}" placeholder="如：浓硫酸">
                </div>
                <div class="form-group">
                    <label>类别 <span class="required">*</span></label>
                    <select name="category" class="form-control" required>
                        {% for key, val in CATEGORY_MAP.items() %}
                        <option value="{{ key }}" {% if supply and supply.category == key %}selected{% endif %}>{{ val }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>计量单位 <span class="required">*</span></label>
                    <input type="text" name="unit" class="form-control" required value="{{ supply.unit if supply else '瓶' }}" placeholder="如：瓶、盒、包、mL">
                </div>
                <div class="form-group">
                    <label>单价（元）<span class="required">*</span></label>
                    <input type="number" name="unit_price" step="0.01" min="0" class="form-control" required value="{{ supply.unit_price if supply else '0.00' }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>规格</label>
                    <input type="text" name="specification" class="form-control" value="{{ supply.specification if supply else '' }}" placeholder="如：500mL/分析纯">
                </div>
                <div class="form-group">
                    <label>是否高风险</label>
                    <select name="is_high_risk" class="form-control" onchange="toggleRisk(this)">
                        <option value="false" {% if supply and not supply.is_high_risk %}selected{% endif %}>否</option>
                        <option value="true" {% if supply and supply.is_high_risk %}selected{% endif %}>是</option>
                    </select>
                </div>
                <div class="form-group" id="riskLevelGroup">
                    <label>风险等级</label>
                    <select name="risk_level" class="form-control">
                        {% for key, val in RISK_MAP.items() %}
                        <option value="{{ key }}" {% if supply and supply.risk_level == key %}selected{% endif %}>{{ val }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>描述说明</label>
                <textarea name="description" class="form-control" rows="3" placeholder="详细描述、安全注意事项等...">{{ supply.description if supply else '' }}</textarea>
            </div>
            <div class="form-actions">
                <a href="/supplies" class="btn btn-outline">取消</a>
                <button type="submit" class="btn btn-primary">💾 保存</button>
            </div>
        </form>
    </div>
</div>

<script>
function toggleRisk(sel) {
    document.getElementById('riskLevelGroup').style.opacity = sel.value === 'true' ? '1' : '0.5';
}
</script>
{% endblock %}
