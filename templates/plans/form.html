{% extends "base.html" %}
{% block title %}{% if plan %}编辑{% else %}创建{% endif %}实验计划{% endblock %}
{% block content %}

<div class="page-header">
    <div class="page-title">📚 {% if plan %}编辑实验计划{% else %}创建实验课计划{% endif %}</div>
    <div class="page-actions">
        <a href="/plans" class="btn btn-outline btn-sm">← 返回列表</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <div class="form-group">
                <label>计划标题 <span class="required">*</span></label>
                <input type="text" name="title" class="form-control" required value="{{ plan.title if plan else '' }}" placeholder="如：有机化学实验 - 乙酸乙酯的制备">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>课程名称</label>
                    <input type="text" name="course_name" class="form-control" value="{{ plan.course_name if plan else '' }}" placeholder="如：有机化学实验">
                </div>
                <div class="form-group">
                    <label>班级</label>
                    <input type="text" name="class_name" class="form-control" value="{{ plan.class_name if plan else '' }}" placeholder="如：化学2024级1班">
                </div>
                <div class="form-group">
                    <label>学生人数</label>
                    <input type="number" name="student_count" min="0" class="form-control" value="{{ plan.student_count if plan else 0 }}">
                </div>
                <div class="form-group">
                    <label>计划实验日期 <span class="required">*</span></label>
                    <input type="date" name="plan_date" class="form-control" required value="{{ plan.plan_date.isoformat() if plan else today }}">
                </div>
            </div>
            <div class="form-group">
                <label>实验内容描述</label>
                <textarea name="description" class="form-control" rows="4" placeholder="描述实验目的、主要步骤、特殊要求等...">{{ plan.description if plan else '' }}</textarea>
            </div>
            <div class="form-actions">
                <a href="/plans" class="btn btn-outline">取消</a>
                <button type="submit" class="btn btn-primary">💾 保存计划</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
