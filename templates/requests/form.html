{% extends "base.html" %}
{% block title %}提交领用申请{% endblock %}
{% block content %}

<div class="page-header">
    <div class="page-title">📋 提交耗材领用申请</div>
    <div class="page-actions">
        <a href="/requests" class="btn btn-outline btn-sm">← 返回列表</a>
    </div>
</div>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
    <div class="card-body">
        <form method="post" id="requestForm">
            <div class="form-row">
                <div class="form-group">
                    <label>关联实验计划 <span class="required">*</span></label>
                    <select name="plan_id" class="form-control" required>
                        <option value="">-- 请选择实验计划 --</option>
                        {% for p in plans %}
                        <option value="{{ p.id }}" {% if p.id == selected_plan_id %}selected{% endif %}>
                            {{ p.title }} ({{ p.plan_date.strftime('%Y-%m-%d') }})
                        </option>
                        {% endfor %}
                    </select>
                    {% if not plans %}
                    <div class="text-warning text-sm mt-1">
                        ⚠️ 还没有创建实验计划，请先<a href="/plans/new">创建实验计划</a>
                    </div>
                    {% endif %}
                </div>
                <div class="form-group">
                    <label>紧急程度</label>
                    <select name="urgency" class="form-control">
                        {% for key, val in URGENCY_MAP.items() %}
                        <option value="{{ key }}">{{ val }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>备注说明</label>
                <textarea name="remark" class="form-control" rows="2" placeholder="如有特殊要求请在此说明..."></textarea>
            </div>

            <div class="mt-3 mb-2">
                <div class="flex-between">
                    <label style="font-weight:600; font-size:14px;">📦 申请耗材清单</label>
                    <button type="button" class="btn btn-primary btn-sm" onclick="addSupplyRow()">➕ 添加耗材</button>
                </div>
            </div>

            <div id="supplyItems">
                <div class="supply-item-row" data-idx="0">
                    <div class="form-group" style="margin-bottom:0;">
                        <label>耗材名称</label>
                        <select name="supply_id_0" class="form-control supply-select" onchange="updateAvail(this)" required>
                            <option value="">-- 选择 --</option>
                            {% for s in supplies %}
                            <option value="{{ s.id }}" data-avail="{{ supply_avail.get(s.id, 0) }}" data-unit="{{ s.unit }}" data-price="{{ s.unit_price }}">
                                {{ s.name }} ({{ s.specification or s.unit }}) - ¥{{ s.unit_price }}
                                {% if s.is_high_risk %} ⚠️{% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>申请数量</label>
                        <input type="number" name="quantity_0" step="0.01" min="0.01" class="form-control qty-input" oninput="updateRow(this)" required>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label>可用库存</label>
                        <div class="form-control" style="background:#f8fafc; border-color:#e2e8f0; color:#64748b;">
                            <span class="avail-text">-</span>
                        </div>
                    </div>
                    <button type="button" class="remove-btn" onclick="removeRow(this)" title="删除">×</button>
                    <div class="form-group" style="grid-column: span 4; margin-bottom:0; margin-top:6px;">
                        <input type="text" name="item_remark_0" class="form-control" placeholder="该项备注（可选）">
                    </div>
                </div>
            </div>

            <div class="mt-2 p-3" style="background:#f0f9ff; border-radius:8px;">
                <div class="flex-between">
                    <span class="text-muted text-sm">预估总金额：</span>
                    <span style="font-size:18px; font-weight:700; color:#2563eb;">¥ <span id="totalAmount">0.00</span></span>
                </div>
            </div>

            <div class="alert alert-warning text-sm mt-2">
                ⚠️ 注意：申请提交后将进入审批流程。审批通过后库存将被冻结，发放时扣减实际库存。
                如申请量超过可用库存，提交将被拒绝。
            </div>

            <div class="form-actions mt-3">
                <a href="/requests" class="btn btn-outline">取消</a>
                <button type="submit" class="btn btn-primary">📤 提交申请</button>
            </div>
        </form>
    </div>
</div>

<script>
let rowIdx = 1;

function addSupplyRow() {
    const container = document.getElementById('supplyItems');
    const idx = rowIdx++;
    const selectOpts = container.querySelector('.supply-select').innerHTML;
    const div = document.createElement('div');
    div.className = 'supply-item-row';
    div.dataset.idx = idx;
    div.innerHTML = `
        <div class="form-group" style="margin-bottom:0;">
            <label>耗材名称</label>
            <select name="supply_id_${idx}" class="form-control supply-select" onchange="updateAvail(this)" required>
                ${selectOpts}
            </select>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label>申请数量</label>
            <input type="number" name="quantity_${idx}" step="0.01" min="0.01" class="form-control qty-input" oninput="updateRow(this)" required>
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <label>可用库存</label>
            <div class="form-control" style="background:#f8fafc; border-color:#e2e8f0; color:#64748b;">
                <span class="avail-text">-</span>
            </div>
        </div>
        <button type="button" class="remove-btn" onclick="removeRow(this)" title="删除">×</button>
        <div class="form-group" style="grid-column: span 4; margin-bottom:0; margin-top:6px;">
            <input type="text" name="item_remark_${idx}" class="form-control" placeholder="该项备注（可选）">
        </div>
    `;
    container.appendChild(div);
}

function removeRow(btn) {
    const rows = document.querySelectorAll('.supply-item-row');
    if (rows.length <= 1) {
        alert('至少保留一项耗材申请');
        return;
    }
    btn.closest('.supply-item-row').remove();
    updateTotal();
}

function updateAvail(sel) {
    const row = sel.closest('.supply-item-row');
    const opt = sel.options[sel.selectedIndex];
    const avail = opt.dataset.avail || 0;
    const unit = opt.dataset.unit || '';
    row.querySelector('.avail-text').textContent = `${avail} ${unit}`;
    updateTotal();
}

function updateRow(input) {
    const row = input.closest('.supply-item-row');
    const sel = row.querySelector('.supply-select');
    const opt = sel.options[sel.selectedIndex];
    const avail = parseFloat(opt.dataset.avail || 0);
    const qty = parseFloat(input.value || 0);
    if (qty > avail && avail > 0) {
        input.style.borderColor = '#ef4444';
        input.style.backgroundColor = '#fef2f2';
    } else {
        input.style.borderColor = '';
        input.style.backgroundColor = '';
    }
    updateTotal();
}

function updateTotal() {
    let total = 0;
    document.querySelectorAll('.supply-item-row').forEach(row => {
        const sel = row.querySelector('.supply-select');
        const qtyInput = row.querySelector('.qty-input');
        if (sel.selectedIndex > 0 && qtyInput.value) {
            const opt = sel.options[sel.selectedIndex];
            const price = parseFloat(opt.dataset.price || 0);
            const qty = parseFloat(qtyInput.value || 0);
            total += price * qty;
        }
    });
    document.getElementById('totalAmount').textContent = total.toFixed(2);
}
</script>
{% endblock %}
